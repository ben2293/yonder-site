<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yonder — A place someone saved for you</title>
<meta property="og:title" content="Yonder">
<meta property="og:description" content="Someone shared a place with you from Yonder — a places reminder app that quietly notifies you the moment you're near your fav place.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://ben2293.github.io/yonder-site/icon.png">
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6; max-width: 480px; margin: 0 auto; padding: 56px 24px;
    color: #1c1c1e; background: #fff; text-align: center;
  }
  @media (prefers-color-scheme: dark) { body { color: #f2f2f7; background: #000; } }
  .icon {
    width: 84px; height: 84px; border-radius: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
  }
  h1 {
    font-size: 1.5rem; font-weight: 700; line-height: 1.35;
    margin: 1.5rem 0 .5rem;
  }
  .wordmark { color: #8e8e93; font-size: .9rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; margin: 0; }
  .subhero { color: #8e8e93; font-weight: 400; font-size: 1rem; margin: .5rem 0 0; }
  #placeName { font-size: 1.15rem; font-weight: 600; margin-top: 2rem; }
  #placeSub { color: #8e8e93; font-size: .9rem; }
  .cta {
    display: inline-block; margin-top: 2rem; padding: 14px 28px;
    background: #007aff; color: #fff; border-radius: 12px;
    text-decoration: none; font-weight: 600;
  }
  .secondary { display: block; margin-top: 1rem; font-size: .9rem; color: #007aff; text-decoration: none; }
  footer { margin-top: 3rem; font-size: .8rem; color: #8e8e93; }
</style>
</head>
<body>
  <img class="icon" src="https://ben2293.github.io/yonder-site/icon.png" alt="Yonder">
  <p class="wordmark">Yonder</p>
  <h1>Someone shared a place with you from Yonder</h1>
  <p class="subhero">A places reminder app that quietly notifies you the moment you're near your fav place</p>

  <div id="placeName"></div>
  <div id="placeSub"></div>

  <a class="cta" href="https://apps.apple.com/app/id6780354330" id="appStoreLink">Get Yonder</a>
  <a class="secondary" href="#" id="mapsLink" style="display:none">Open in Apple Maps instead</a>

  <footer>
    <p>© 2026 Yonder</p>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    const lat = params.get('lat');
    const lon = params.get('lon');
    if (name) {
      document.getElementById('placeName').textContent = decodeURIComponent(name.replace(/\+/g, ' '));
      document.title = name + ' — shared via Yonder';
    }
    if (lat && lon) {
      document.getElementById('placeSub').textContent = 'Saved as a Yonder reminder';
      const mapsLink = document.getElementById('mapsLink');
      mapsLink.href = `https://maps.apple.com/?ll=${lat},${lon}&q=${encodeURIComponent(name || 'Pin')}`;
      mapsLink.style.display = 'block';
    }
  </script>
</body>
</html>
